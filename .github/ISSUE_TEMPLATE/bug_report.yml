name: Bug report
description: Report a reproducible FormMint problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private concepts, personal information, local paths, or unpublished Marketplace files. Security reports follow SECURITY.md.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the result and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Select a silhouette...
        2. Change...
        3. Observe...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: textarea
    id: parameters
    attributes:
      label: Synthetic parameters
      description: Share only minimal parameter values that contain no private concept information.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, private concepts, local paths, and identifying information.
          required: true
        - label: This is not a security vulnerability or Marketplace moderation appeal.
          required: true
