name: One-time privacy rewrite

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/privacy-rewrite.yml"

permissions:
  contents: write

jobs:
  rewrite:
    if: >-
      github.repository_owner == 'RepoEnjoyer' &&
      github.event.head_commit.message == 'privacy: sanitize historical Git metadata'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out complete repository history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Rewrite unsafe author and committer identities
        shell: bash
        run: |
          set -euo pipefail

          safe_email="$(git log -1 --format='%ae')"
          case "$safe_email" in
            *@users.noreply.github.com) ;;
            *)
              echo "The trigger commit does not use a GitHub noreply address." >&2
              exit 1
              ;;
          esac
          export SAFE_EMAIL="$safe_email"

          git fetch --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*'

          git checkout --detach
          while IFS= read -r remote_ref; do
            branch="${remote_ref#refs/remotes/origin/}"
            [[ "$branch" == "HEAD" ]] && continue
            git branch --force "$branch" "$remote_ref"
          done < <(git for-each-ref --format='%(refname)' refs/remotes/origin)
          git checkout main

          env_filter=$(cat <<'FILTER'
          case "$GIT_AUTHOR_EMAIL" in
            *@users.noreply.github.com|noreply@github.com) ;;
            *)
              GIT_AUTHOR_NAME="RepoEnjoyer"
              GIT_AUTHOR_EMAIL="$SAFE_EMAIL"
              export GIT_AUTHOR_NAME GIT_AUTHOR_EMAIL
              ;;
          esac
          case "$GIT_COMMITTER_EMAIL" in
            *@users.noreply.github.com|noreply@github.com) ;;
            *)
              GIT_COMMITTER_NAME="RepoEnjoyer"
              GIT_COMMITTER_EMAIL="$SAFE_EMAIL"
              export GIT_COMMITTER_NAME GIT_COMMITTER_EMAIL
              ;;
          esac
          FILTER
          )

          export FILTER_BRANCH_SQUELCH_WARNING=1
          git filter-branch --force \
            --env-filter "$env_filter" \
            --tag-name-filter cat \
            -- --all

          git config user.name "RepoEnjoyer"
          git config user.email "$SAFE_EMAIL"
          git checkout main
          git rm .github/workflows/privacy-rewrite.yml
          git commit -m "privacy: remove one-time history rewriter"

          git for-each-ref --format='delete %(refname)' refs/original | git update-ref --stdin || true
          git reflog expire --expire=now --all
          git gc --prune=now

          git push --force origin 'refs/heads/*:refs/heads/*'
          if git for-each-ref --format='%(refname)' refs/tags | grep -q .; then
            git push --force origin 'refs/tags/*:refs/tags/*'
          fi
