  <circle cx="230" cy="70" r="330" fill="url(#pageGlow)"/>
  <circle cx="1430" cy="870" r="360" fill="url(#pageGlow)" opacity=".55"/>
  <path d="M0 795C275 726 482 858 746 811c279-50 497-158 854-62v211H0Z" fill="#111723" opacity=".52"/>

  <rect x="54" y="48" width="1492" height="864" rx="28" fill="url(#frame)" stroke="#2b3442" stroke-width="1.5" filter="url(#frameShadow)"/>

