<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">FormMint procedural accessory forge</title>
  <desc id="desc">A sleek dark creator workbench with procedural controls, a large interactive crown preview, and a live geometry readiness panel.</desc>

  <defs>
    <linearGradient id="backdrop" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0b0e14"/>
      <stop offset=".55" stop-color="#10151e"/>
      <stop offset="1" stop-color="#080a0f"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#121821"/>
      <stop offset="1" stop-color="#0c1017"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#151b25"/>
      <stop offset="1" stop-color="#10151d"/>
    </linearGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#e8ff92"/>
      <stop offset=".42" stop-color="#c5ed58"/>
      <stop offset=".72" stop-color="#82dca1"/>
      <stop offset="1" stop-color="#8d7cff"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#c7f15b"/>
      <stop offset=".48" stop-color="#6be8c7"/>
      <stop offset="1" stop-color="#8e7dff"/>
    </linearGradient>
    <radialGradient id="viewportGlow">
      <stop stop-color="#7b68f4" stop-opacity=".26"/>
      <stop offset=".48" stop-color="#67d8bd" stop-opacity=".09"/>
      <stop offset="1" stop-color="#090c12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pageGlow">
      <stop stop-color="#7a68f1" stop-opacity=".2"/>
      <stop offset="1" stop-color="#0b0e14" stop-opacity="0"/>
    </radialGradient>
    <filter id="frameShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="38" flood-color="#000" flood-opacity=".48"/>
    </filter>
    <filter id="objectShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#68dec1" flood-opacity=".16"/>
    </filter>
    <filter id="softBlur"><feGaussianBlur stdDeviation="28"/></filter>
    <clipPath id="appClip"><rect x="54" y="48" width="1492" height="864" rx="28"/></clipPath>
  </defs>

